<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient violet moderne -->
  <defs>
    <linearGradient id="landkit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#landkit-gradient)"/>

  <!-- Motifs décoratifs -->
  <circle cx="100" cy="100" r="60" fill="white" opacity="0.1"/>
  <circle cx="700" cy="350" r="80" fill="white" opacity="0.1"/>
  <rect x="300" y="50" width="200" height="200" fill="white" opacity="0.05" rx="20"/>

  <!-- Icône landing page stylisée -->
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="200" height="150" rx="8" fill="white" opacity="0.9"/>
    <rect x="10" y="10" width="60" height="8" rx="4" fill="#8B5CF6"/>
    <rect x="10" y="25" width="100" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="10" y="35" width="80" height="6" rx="3" fill="#E5E7EB"/>
    <rect x="10" y="50" width="180" height="80" rx="6" fill="#F3F4F6"/>
    <circle cx="100" cy="90" r="20" fill="#A78BFA"/>
  </g>

  <!-- Texte -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Landkit</text>
</svg>
