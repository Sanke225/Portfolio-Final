<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient orange-violet -->
  <defs>
    <linearGradient id="agent-ia-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#agent-ia-gradient)"/>

  <!-- Motifs décoratifs -->
  <circle cx="120" cy="120" r="80" fill="white" opacity="0.1"/>
  <circle cx="680" cy="330" r="70" fill="white" opacity="0.1"/>
  <rect x="200" y="300" width="120" height="120" fill="white" opacity="0.05" rx="15"/>

  <!-- Robot IA stylisé -->
  <g transform="translate(325, 140)">
    <!-- Tête du robot -->
    <rect x="40" y="0" width="80" height="70" rx="15" fill="white" opacity="0.9"/>

    <!-- Yeux -->
    <circle cx="60" cy="30" r="8" fill="#FF8C42"/>
    <circle cx="100" cy="30" r="8" fill="#FF8C42"/>

    <!-- Antenne -->
    <line x1="80" y1="0" x2="80" y2="-20" stroke="white" stroke-width="3" opacity="0.9"/>
    <circle cx="80" cy="-20" r="5" fill="white" opacity="0.9"/>

    <!-- Corps -->
    <rect x="30" y="80" width="100" height="80" rx="10" fill="white" opacity="0.9"/>

    <!-- Bulles de dialogue -->
    <circle cx="-30" cy="40" r="15" fill="white" opacity="0.7"/>
    <circle cx="-15" cy="60" r="12" fill="white" opacity="0.7"/>
    <circle cx="-5" cy="80" r="10" fill="white" opacity="0.7"/>

    <circle cx="190" cy="50" r="18" fill="white" opacity="0.7"/>
    <circle cx="175" cy="70" r="14" fill="white" opacity="0.7"/>
    <circle cx="165" cy="90" r="11" fill="white" opacity="0.7"/>

    <!-- Symbole IA -->
    <text x="80" y="135" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FF8C42" text-anchor="middle">AI</text>
  </g>

  <!-- Texte -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Agent IA Service Client</text>
</svg>
