<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient bleu-violet -->
  <defs>
    <linearGradient id="flowfund-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#flowfund-gradient)"/>

  <!-- Motifs décoratifs -->
  <circle cx="150" cy="350" r="70" fill="white" opacity="0.1"/>
  <circle cx="650" cy="100" r="90" fill="white" opacity="0.1"/>
  <rect x="550" y="300" width="150" height="150" fill="white" opacity="0.05" rx="20"/>

  <!-- Icône cagnotte stylisée -->
  <g transform="translate(325, 150)">
    <!-- Pot de cagnotte -->
    <ellipse cx="75" cy="140" rx="75" ry="20" fill="white" opacity="0.9"/>
    <rect x="30" y="60" width="90" height="80" fill="white" opacity="0.9"/>
    <ellipse cx="75" cy="60" rx="45" ry="15" fill="white" opacity="0.9"/>

    <!-- Pièces qui tombent -->
    <circle cx="75" cy="30" r="12" fill="#FFD700" opacity="0.9"/>
    <circle cx="50" cy="10" r="10" fill="#FFD700" opacity="0.7"/>
    <circle cx="100" cy="15" r="10" fill="#FFD700" opacity="0.7"/>

    <!-- Symbole dollar -->
    <text x="75" y="110" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#3B82F6" text-anchor="middle">$</text>
  </g>

  <!-- Texte -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">FlowFund</text>
</svg>
